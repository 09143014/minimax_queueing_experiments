experiment:
  name: polling_nnq_smoke
  output_dir: results

env:
  name: polling
  lambda_arrivals: [1.0, 1.5]
  mu_service: 2.0
  gamma: 0.95
  attack_cost: 0.5
  defend_cost: 0.2
  switch_cost: 0.3
  queue_cost: sum
  initial_queues: [0, 0]
  initial_position: 0
  uniformization_rate: 5.0

algorithm:
  name: nnq

nnq:
  hidden_size: 16
  learning_rate: 0.001
  total_steps: 100
  batch_size: 16
  replay_capacity: 500
  target_update_interval: 50
  epsilon: 0.3
  seed: 0
  log_interval: 20
  state_scale: 10.0

evaluation:
  num_episodes: 3
  horizon: 20
  seed: 400
  tail_threshold: 8
  boundary_state: 10
