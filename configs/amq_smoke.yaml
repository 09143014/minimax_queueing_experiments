experiment:
  name: service_rate_control_amq_smoke
  output_dir: results

env:
  name: service_rate_control
  gamma: 0.95
  lambda_arrival: 2.0
  mu_levels: [1.0, 3.0, 5.0]
  service_costs: [0.0, 0.5, 2.0]
  attack_cost: 0.5
  q_congestion: 1.0
  initial_state: 0
  uniformization_rate: 7.0
  robust_defender_actions: [2]

algorithm:
  name: amq

amq:
  feature_set: basic_quadratic
  learning_rate_schedule: constant
  eta0: 0.001
  total_steps: 200
  seed: 0
  log_interval: 20
  weight_clip: 100.0

evaluation:
  num_episodes: 3
  horizon: 20
  seed: 100
  tail_threshold: 8
  boundary_state: 10

policy_grid:
  max_state: 10
  high_probability_threshold: 0.5
