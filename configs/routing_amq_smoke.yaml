experiment:
  name: routing_amq_smoke
  output_dir: results

env:
  name: routing
  lambda_arrival: 2.0
  mu_rates: [1.0, 1.5, 2.0]
  gamma: 0.95
  attack_cost: 0.5
  defend_cost: 0.2
  congestion_cost: sum
  initial_state: [0, 0, 0]
  uniformization_rate: 6.5

algorithm:
  name: amq

amq:
  feature_set: basic
  learning_rate_schedule: constant
  eta0: 0.001
  total_steps: 200
  seed: 0
  log_interval: 20
  weight_clip: 100.0

bvi:
  max_queue_length: 3
  boundary_mode: clip

evaluation:
  num_episodes: 3
  horizon: 20
  seed: 300
  tail_threshold: 8
  boundary_state: 10

policy_grid:
  high_probability_threshold: 0.5
