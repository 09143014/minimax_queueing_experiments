experiment:
  name: routing_amq_normalized_debug
  output_dir: results

env:
  name: routing
  lambda_arrival: 2.0
  mu_rates: [1.0, 1.5, 2.0]
  gamma: 0.95
  attack_cost: 0.5
  defend_cost: 0.2
  congestion_cost: sum
  initial_state: [0, 0, 0]
  uniformization_rate: 6.5

algorithm:
  name: amq

amq:
  feature_set: normalized_full_action_interaction
  learning_rate_schedule: constant
  eta0: 0.001
  decay_power: 0.6
  total_steps: 100000
  seed: 0
  log_interval: 5000
  weight_clip: 1000.0
  exploring_starts_probability: 0.1
  exploring_starts_max_queue_length: 3

bvi:
  max_queue_length: 3
  boundary_mode: clip

evaluation:
  num_episodes: 10
  horizon: 50
  seed: 300
  tail_threshold: 8
  boundary_state: 10

policy_grid:
  high_probability_threshold: 0.5
