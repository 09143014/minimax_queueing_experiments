experiment:
  name: routing_nnq_smoke
  output_dir: results

env:
  name: routing
  lambda_arrival: 2.0
  mu_rates: [1.0, 1.5, 2.0]
  gamma: 0.95
  attack_cost: 0.5
  defend_cost: 0.2
  congestion_cost: sum
  initial_state: [0, 0, 0]
  uniformization_rate: 6.5

algorithm:
  name: nnq

nnq:
  hidden_size: 16
  learning_rate: 0.001
  total_steps: 200
  batch_size: 16
  replay_capacity: 500
  target_update_interval: 50
  epsilon: 0.3
  seed: 0
  log_interval: 20
  state_scale: 10.0

bvi:
  max_queue_length: 3
  boundary_mode: clip

evaluation:
  num_episodes: 3
  horizon: 20
  seed: 300
  tail_threshold: 8
  boundary_state: 10

policy_grid:
  high_probability_threshold: 0.5
